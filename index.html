<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrandPlayzone — FMCG Brand Simulation Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            bp: {
              bg:       '#070d1a',
              surface:  '#0d1629',
              card:     '#111f35',
              elevated: '#162540',
              border:   '#1e3354',
              indigo:   '#6366f1',
              cyan:     '#22d3ee',
              emerald:  '#10b981',
              amber:    '#f59e0b',
              rose:     '#f43f5e',
              muted:    '#64748b',
            }
          }
        }
      }
    }
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #070d1a; color: #f1f5f9; font-family: 'Inter', sans-serif; }

    :root {
      --bg:       #070d1a;
      --surface:  #0d1629;
      --card:     #111f35;
      --elevated: #162540;
      --border:   #1e3354;
      --indigo:   #6366f1;
      --cyan:     #22d3ee;
      --emerald:  #10b981;
      --amber:    #f59e0b;
      --rose:     #f43f5e;
      --muted:    #64748b;
      --text:     #f1f5f9;
      --text-sub: #94a3b8;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Fade-in animation for screen transitions */
    #app > div { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Card hover lift */
    .card-hover { transition: transform 0.18s ease, box-shadow 0.18s ease; cursor: pointer; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }

    /* Selectable card */
    .selectable { border: 2px solid var(--border); transition: border-color 0.15s, background 0.15s; cursor: pointer; }
    .selectable:hover { border-color: var(--indigo); }
    .selectable.selected { border-color: var(--indigo); background: rgba(99,102,241,0.08); }
    .selectable.disabled { opacity: 0.4; pointer-events: none; }

    /* Gradient text */
    .grad-text { background: linear-gradient(135deg, #818cf8 0%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grad-text-warm { background: linear-gradient(135deg, #f59e0b 0%, #f43f5e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Glow effects */
    .glow-indigo { box-shadow: 0 0 20px rgba(99,102,241,0.25); }
    .glow-cyan   { box-shadow: 0 0 20px rgba(34,211,238,0.25); }

    /* Range slider */
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--indigo); cursor: pointer; border: 2px solid #070d1a; box-shadow: 0 0 8px rgba(99,102,241,0.5); }
    input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--indigo); cursor: pointer; border: 2px solid #070d1a; }

    /* Pulse dot */
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 6px rgba(16,185,129,0.6); animation: pulseDot 2s infinite; }
    @keyframes pulseDot { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.3); opacity:0.7; } }

    /* Progress bar */
    .prog-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--cyan)); border-radius: 2px; transition: width 0.5s ease; }

    /* Metric card */
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }

    /* Tag badge */
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; }
    .tag-indigo { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
    .tag-cyan    { background: rgba(34,211,238,0.12); color: #67e8f9; border: 1px solid rgba(34,211,238,0.2); }
    .tag-emerald { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    .tag-amber   { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
    .tag-rose    { background: rgba(244,63,94,0.12);  color: #fca5a5; border: 1px solid rgba(244,63,94,0.2); }

    /* Button styles */
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; padding: 12px 28px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: var(--card); color: var(--text-sub); border: 1px solid var(--border); padding: 12px 28px; border-radius: 10px; font-weight: 500; font-size: 15px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .btn-secondary:hover { background: var(--elevated); color: var(--text); }
    .btn-ghost { background: transparent; color: var(--text-sub); border: none; padding: 8px 16px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: color 0.15s; }
    .btn-ghost:hover { color: var(--text); }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e3354; color: #94a3b8; font-size: 12px; padding: 6px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 99; border: 1px solid var(--border); }
    [data-tip]:hover::after { opacity: 1; }

    /* Coach box */
    .coach-box { background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(34,211,238,0.06)); border: 1px solid rgba(99,102,241,0.2); border-radius: 14px; padding: 20px 24px; }

    /* Event card reveal */
    .event-card-wrapper { perspective: 1000px; }
    .event-card-inner { transform-style: preserve-3d; animation: cardReveal 0.6s ease-out forwards; }
    @keyframes cardReveal { from { transform: rotateY(-90deg) scale(0.95); opacity: 0; } to { transform: rotateY(0) scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div id="app">
    <!-- Content rendered by JavaScript -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;">
      <div style="width:40px;height:40px;border:3px solid #6366f1;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="color:#64748b;font-size:14px;">Loading BrandPlayzone...</p>
    </div>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <!-- Game scripts — order matters -->
  <script src="js/data.js"></script>
  <script src="js/rationale-data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
